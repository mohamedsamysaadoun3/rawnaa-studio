<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرونقق — ستوديو الريلز</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f1115;
            --card: #1a1d25;
            --border: #2a2d35;
            --text: #e8e6e3;
            --text-dim: #989898;
            --gold: #c9a84c;
            --gold-bright: #e2c36c;
            --accent: #3d7a5c;
            --danger: #c0392b;
            --radius: 12px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-family: var(--font);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            padding-bottom: 100px;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        .header h1 { font-size: 24px; color: var(--gold); margin-bottom: 4px; }
        .header p { font-size: 14px; color: var(--text-dim); }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Search */
        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: var(--font);
            outline: none;
            transition: border 0.2s;
        }
        .search-input:focus { border-color: var(--gold); }

        /* Select grid */
        .select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 2px;
        }
        .select-item {
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text);
        }
        .select-item:hover { border-color: var(--gold); }
        .select-item.selected {
            border-color: var(--gold);
            background: rgba(201, 168, 76, 0.12);
            color: var(--gold-bright);
        }
        .select-item .surah-num {
            font-size: 11px;
            color: var(--text-dim);
            display: block;
        }

        /* Range inputs */
        .range-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .range-input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            text-align: center;
            font-family: var(--font);
            outline: none;
            width: 80px;
        }
        .range-input:focus { border-color: var(--gold); }
        .range-label {
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* Reciter search */
        .reciter-list {
            max-height: 250px;
            overflow-y: auto;
        }
        .reciter-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s;
        }
        .reciter-item:hover { background: rgba(255,255,255,0.03); }
        .reciter-item.selected {
            background: rgba(201, 168, 76, 0.08);
            border-left: 3px solid var(--gold);
        }
        .reciter-name { font-size: 15px; }
        .reciter-style { font-size: 12px; color: var(--text-dim); }
        .reciter-radio {
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
        }
        .reciter-item.selected .reciter-radio {
            border-color: var(--gold);
            background: var(--gold);
            box-shadow: 0 0 0 3px var(--bg) inset;
        }

        /* Preview */
        .preview-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .preview-surah {
            font-size: 28px;
            color: var(--gold-bright);
            font-weight: bold;
        }
        .preview-ayahs {
            font-size: 14px;
            color: var(--text-dim);
        }
        .preview-reciter {
            font-size: 13px;
            color: var(--accent);
        }

        /* Generate button */
        .generate-btn {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            max-width: 468px;
            margin: 0 auto;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), #b8922e);
            border: none;
            border-radius: var(--radius);
            color: #1a1a1a;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: var(--font);
        }
        .generate-btn:hover { transform: scale(1.02); }
        .generate-btn:active { transform: scale(0.98); }
        .generate-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        @media (max-width: 400px) {
            .select-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="header">
        <h1>🎬 ستوديو الرونقق</h1>
        <p>اختر السورة، القارئ، واضغط أنشئ</p>
    </div>

    <!-- Surah Selection -->
    <div class="section">
        <div class="section-title">📖 السورة</div>
        <input type="text" class="search-input" id="surahSearch" placeholder="🔍 ابحث عن سورة..." oninput="filterSurahs()">
        <div class="select-grid" id="surahGrid"></div>
    </div>

    <!-- Ayah Range -->
    <div class="section" id="ayahSection" style="display:none">
        <div class="section-title" id="ayahSectionTitle">📝 الآيات</div>
        <div class="range-row">
            <span class="range-label">من آية</span>
            <input type="number" class="range-input" id="ayahStart" min="1" value="1" onchange="updatePreview()">
            <span class="range-label">إلى آية</span>
            <input type="number" class="range-input" id="ayahEnd" min="1" value="7" onchange="updatePreview()">
        </div>
    </div>

    <!-- Reciter Selection -->
    <div class="section">
        <div class="section-title">🎙️ القارئ</div>
        <input type="text" class="search-input" id="reciterSearch" placeholder="🔍 ابحث عن قارئ..." oninput="filterReciters()">
        <div class="reciter-list" id="reciterList"></div>
    </div>

    <!-- Preview -->
    <div class="section">
        <div class="section-title">👁️ معاينة</div>
        <div class="preview-box" id="preview">
            <div class="preview-surah" id="previewSurah">—</div>
            <div class="preview-ayahs" id="previewAyahs">اختر سورة</div>
            <div class="preview-reciter" id="previewReciter">خالد الجليل</div>
        </div>
    </div>

    <!-- Generate Button -->
    <button class="generate-btn" id="generateBtn" disabled onclick="generate()">
        ✨ أنشئ الريل
    </button>

<script>
// ── Data ────────────────────────────────────────────────
const SURAHS = [
    "الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
    "هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
    "الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
    "لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
    "فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
    "الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
    "الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
    "نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
    "التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
    "الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
    "القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
    "المسد","الإخلاص","الفلق","الناس"
];

const AYAH_COUNTS = [7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,6,6];

const RECITERS = [
    {id:"mp3q:20",name:"خالد الجليل",style:"حفص"},
    {id:"ar.alafasy",name:"مشاري العفاسي",style:"حفص"},
    {id:"mp3q:4",name:"عبد الباسط عبد الصمد",style:"مجود"},
    {id:"mp3q:1",name:"محمود خليل الحصري",style:"حفص"},
    {id:"mp3q:7",name:"سعد الغامدي",style:"حفص"},
    {id:"mp3q:112",name:"ماهر المعيقلي",style:"حفص"},
    {id:"mp3q:3",name:"محمد صديق المنشاوي",style:"مجود"},
    {id:"mp3q:21",name:"عبد الرحمن السديس",style:"حفص"},
    {id:"mp3q:8",name:"أبو بكر الشاطري",style:"حفص"},
    {id:"mp3q:50",name:"أحمد العجمي",style:"حفص"},
    {id:"mp3q:6",name:"محمد جبريل",style:"حفص"},
    {id:"mp3q:5",name:"فارس عباد",style:"حفص"},
    {id:"mp3q:13",name:"هاني الرفاعي",style:"حفص"},
    {id:"mp3q:2",name:"علي الحذيفي",style:"حفص"},
    {id:"mp3q:56",name:"ياسر الدوسري",style:"حفص"},
    {id:"mp3q:11",name:"محمد أيوب",style:"حفص"},
    {id:"mp3q:58",name:"ناصر القطامي",style:"حفص"},
    {id:"mp3q:52",name:"إدريس أبكر",style:"حفص"},
    {id:"mp3q:14",name:"صلاح البدير",style:"حفص"},
    {id:"mp3q:19",name:"عبد الله الجهني",style:"حفص"},
];

// ── State ───────────────────────────────────────────────
let state = {
    surah: null,   // 1-based surah number
    reciter: "mp3q:20",
    ayahStart: 1,
    ayahEnd: 7,
};

const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
    document.body.style.backgroundColor = tg.themeParams.bg_color || document.body.style.backgroundColor;
}

// ── Render Surahs ───────────────────────────────────────
function renderSurahs(filter = "") {
    const grid = document.getElementById("surahGrid");
    const term = filter.toLowerCase().trim();
    let html = "";
    SURAHS.forEach((name, i) => {
        const num = i + 1;
        if (term && !name.includes(term) && !String(num).includes(term)) return;
        const selected = state.surah === num ? " selected" : "";
        html += `<div class="select-item${selected}" onclick="selectSurah(${num})">
            <span class="surah-num">${num}</span>${name}
        </div>`;
    });
    grid.innerHTML = html || '<div style="grid-column:1/-1;text-align:center;color:var(--text-dim);padding:20px">لا توجد نتائج</div>';
}

function selectSurah(num) {
    state.surah = num;
    const totalAyahs = AYAH_COUNTS[num - 1];
    state.ayahStart = 1;
    state.ayahEnd = Math.min(7, totalAyahs);
    
    document.getElementById("ayahStart").max = totalAyahs;
    document.getElementById("ayahEnd").max = totalAyahs;
    document.getElementById("ayahStart").value = 1;
    document.getElementById("ayahEnd").value = state.ayahEnd;
    document.getElementById("ayahSectionTitle").textContent = `📝 الآيات (1-${totalAyahs})`;
    document.getElementById("ayahSection").style.display = "block";
    
    renderSurahs();
    updatePreview();
    checkReady();
}

function filterSurahs() {
    renderSurahs(document.getElementById("surahSearch").value);
}

// ── Render Reciters ─────────────────────────────────────
function renderReciters(filter = "") {
    const list = document.getElementById("reciterList");
    const term = filter.toLowerCase().trim();
    let html = "";
    RECITERS.forEach(r => {
        if (term && !r.name.includes(term)) return;
        const selected = state.reciter === r.id ? " selected" : "";
        html += `<div class="reciter-item${selected}" onclick="selectReciter('${r.id}')">
            <div>
                <div class="reciter-name">${r.name}</div>
                <div class="reciter-style">${r.style}</div>
            </div>
            <div class="reciter-radio"></div>
        </div>`;
    });
    list.innerHTML = html || '<div style="text-align:center;color:var(--text-dim);padding:20px">لا توجد نتائج</div>';
}

function selectReciter(id) {
    state.reciter = id;
    renderReciters();
    updatePreview();
}

function filterReciters() {
    renderReciters(document.getElementById("reciterSearch").value);
}

// ── Preview ─────────────────────────────────────────────
function updatePreview() {
    const start = parseInt(document.getElementById("ayahStart")?.value) || 1;
    const end = parseInt(document.getElementById("ayahEnd")?.value) || 7;
    state.ayahStart = start;
    state.ayahEnd = end;
    
    const surahName = state.surah ? SURAHS[state.surah - 1] : "—";
    const reciterName = RECITERS.find(r => r.id === state.reciter)?.name || "—";
    
    document.getElementById("previewSurah").textContent = `سورة ${surahName}`;
    document.getElementById("previewAyahs").textContent = 
        state.surah ? `الآيات ${start} — ${end}` : "اختر سورة";
    document.getElementById("previewReciter").textContent = `🎙️ ${reciterName}`;
}

// ── Ready ───────────────────────────────────────────────
function checkReady() {
    const btn = document.getElementById("generateBtn");
    btn.disabled = !state.surah;
}

// ── Generate ────────────────────────────────────────────
function generate() {
    if (!state.surah) return;
    
    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    btn.textContent = "⏳ جاري الإنشاء...";
    
    const data = {
        action: "generate_reel",
        surah: state.surah,
        start_ayah: state.ayahStart,
        end_ayah: state.ayahEnd,
        reciter: state.reciter,
    };
    
    if (tg) {
        tg.sendData(JSON.stringify(data));
        tg.close();
    } else {
        // Fallback for testing outside Telegram
        showToast("في بيئة تيليجرام فقط — تم إرسال: " + JSON.stringify(data));
        btn.disabled = false;
        btn.textContent = "✨ أنشئ الريل";
    }
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Init ────────────────────────────────────────────────
renderSurahs();
renderReciters();
updatePreview();
</script>
</body>
</html>
