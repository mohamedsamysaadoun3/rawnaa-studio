<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>الرونقق — ستوديو</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
--bg: #0a0c10; --card: #13161d; --border: #1f2330; --text: #e4e2df;
--dim: #787878; --gold: #c9a84c; --gold2: #e2c46c; --green: #3d7a5c;
--red: #c0392b; --r:12px; --ff:system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:15px var(--ff);max-width:500px;margin:0 auto;padding:16px 16px 120px;min-height:100vh}

/* Header */
.hdr{text-align:center;padding:20px 0 12px}
.hdr h1{font-size:22px;color:var(--gold2);margin-bottom:2px}
.hdr p{font-size:13px;color:var(--dim)}

/* Steps indicator */
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.step{width:32px;height:4px;border-radius:2px;background:var(--border);transition:.3s}
.step.on{background:var(--gold2);width:48px}
.step.done{background:var(--green)}

/* Section card */
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sec-title{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}

/* Search */
.srch{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font:15px var(--ff);outline:none}
.srch:focus{border-color:var(--gold)}

/* Surah grid - 3 columns */
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-height:220px;overflow-y:auto;padding:2px}
.sitem{padding:8px 6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;
font-size:13px;text-align:center;cursor:pointer;transition:.15s}
.sitem:hover{border-color:var(--gold)} .sitem.sel{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold2)}
.sitem .num{font-size:10px;color:var(--dim);display:block}

/* Range slider style */
.rng{display:flex;align-items:center;gap:10px}
.rng input[type=range]{flex:1;accent-color:var(--gold)}
.rng span{font-size:14px;min-width:60px;text-align:center;color:var(--gold2);font-weight:bold}
.rng label{font-size:13px;color:var(--dim);white-space:nowrap}

/* Reciter list */
.rlist{max-height:200px;overflow-y:auto}
.ritem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.ritem:hover{background:rgba(255,255,255,.02)}
.ritem.sel{background:rgba(201,168,76,.06);border-right:3px solid var(--gold)}
.rname{font-size:14px} .rstyle{font-size:11px;color:var(--dim)}
.rdot{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0}
.ritem.sel .rdot{border-color:var(--gold);background:var(--gold);box-shadow:0 0 0 3px var(--card) inset}

/* Font grid */
.fgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.fitem{padding:10px 8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;
font-size:18px;text-align:center;cursor:pointer;transition:.15s}
.fitem:hover,.fitem.sel{border-color:var(--gold);background:rgba(201,168,76,.08)}
.fitem .flabel{display:block;font-size:10px;color:var(--dim);margin-top:2px}

/* Preview */
.prev{background:var(--bg);border:2px solid var(--border);border-radius:var(--r);padding:24px 16px;
text-align:center;min-height:100px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.prev .psurah{font-size:24px;color:var(--gold2);font-weight:bold}
.prev .payah{font-size:13px;color:var(--dim)}
.prev .prec{font-size:13px;color:var(--green)}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);
padding:12px 16px;display:flex;gap:10px;max-width:500px;margin:0 auto}
.bbtn{flex:1;padding:14px;border:none;border-radius:var(--r);font:15px var(--ff);font-weight:bold;
cursor:pointer;text-align:center;transition:.15s}
.bbtn.primary{background:linear-gradient(135deg,var(--gold),#a07d28);color:#1a1a1a}
.bbtn.primary:active{transform:scale(.97)}
.bbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.bbtn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);
color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:99;opacity:0;pointer-events:none;transition:.3s}
.toast.show{opacity:1}

/* Scrollbar */
::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Step indicator -->
<div class="steps">
<div class="step on" id="s1"></div>
<div class="step" id="s2"></div>
<div class="step" id="s3"></div>
</div>

<!-- Step 1: Quran -->
<div class="hdr"><h1>🎬 ستوديو الرونقق</h1><p id="hint">اختر السورة</p></div>

<div class="sec" id="surahSec">
<div class="sec-title">📖 اختر السورة</div>
<input class="srch" id="surahSearch" placeholder="🔍 بحث عن سورة..." oninput="filterSurahs()">
<div class="sgrid" id="surahGrid"></div>
</div>

<!-- Step 2: Ayah range -->
<div class="sec" id="ayahSec" style="display:none">
<div class="sec-title" id="ayahTitle">📝 الآيات</div>
<div class="rng">
<label>من</label><span id="aspan">1</span>
<input type="range" id="astart" min="1" value="1" step="1" oninput="updateRange()">
</div>
<div class="rng" style="margin-top:10px">
<label>إلى</label><span id="espan">7</span>
<input type="range" id="aend" min="1" value="7" step="1" oninput="updateRange()">
</div>
</div>

<!-- Step 3: Reciter + Font -->
<div class="sec" id="reciterSec" style="display:none">
<div class="sec-title">🎙️ القارئ</div>
<input class="srch" id="reciterSearch" placeholder="🔍 بحث عن قارئ..." oninput="filterReciters()">
<div class="rlist" id="reciterList"></div>
</div>

<div class="sec" id="fontSec" style="display:none">
<div class="sec-title">🖌️ الخط</div>
<div class="fgrid" id="fontGrid"></div>
</div>

<!-- Preview -->
<div class="sec" id="prevSec" style="display:none">
<div class="sec-title">👁️ معاينة</div>
<div class="prev">
<div class="psurah" id="pSurah">—</div>
<div class="payah" id="pAyahs">—</div>
<div class="prec" id="pRec">—</div>
</div>
</div>

<!-- Bottom bar -->
<div class="bbar">
<button class="bbtn secondary" id="backBtn" style="display:none" onclick="prevStep()">↩ رجوع</button>
<button class="bbtn primary" id="nextBtn" disabled onclick="nextStep()">التالي ←</button>
</div>

<script>
// ── Data ──────────────────────────────────────────
const S = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
const AC = [7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,6,6];
const R = [{id:"mp3q:20",n:"خالد الجليل",s:"حفص"},{id:"ar.alafasy",n:"مشاري العفاسي",s:"حفص"},{id:"mp3q:4",n:"عبد الباسط عبد الصمد",s:"مجود"},{id:"mp3q:1",n:"محمود خليل الحصري",s:"حفص"},{id:"mp3q:7",n:"سعد الغامدي",s:"حفص"},{id:"mp3q:112",n:"ماهر المعيقلي",s:"حفص"},{id:"mp3q:3",n:"محمد صديق المنشاوي",s:"مجود"},{id:"mp3q:21",n:"عبد الرحمن السديس",s:"حفص"},{id:"mp3q:8",n:"أبو بكر الشاطري",s:"حفص"},{id:"mp3q:50",n:"أحمد العجمي",s:"حفص"},{id:"mp3q:6",n:"محمد جبريل",s:"حفص"},{id:"mp3q:5",n:"فارس عباد",s:"حفص"},{id:"mp3q:13",n:"هاني الرفاعي",s:"حفص"},{id:"mp3q:2",n:"علي الحذيفي",s:"حفص"},{id:"mp3q:56",n:"ياسر الدوسري",s:"حفص"},{id:"mp3q:11",n:"محمد أيوب",s:"حفص"},{id:"mp3q:58",n:"ناصر القطامي",s:"حفص"},{id:"mp3q:52",n:"إدريس أبكر",s:"حفص"},{id:"mp3q:14",n:"صلاح البدير",s:"حفص"},{id:"mp3q:19",n:"عبد الله الجهني",s:"حفص"}];
const F = [{id:"mushaf",n:"المصحف",t:"﷽"},{id:"uthmani",n:"عثماني",t:"﷽"},{id:"quran_amiri",n:"أميري قرآن",t:"﷽"},{id:"amiri",n:"أميري",t:"﷽"},{id:"hafs",n:"حفص",t:"﷽"}];

// State
let step=1, sur=null, start=1, end=7, rec="mp3q:20", font="mushaf";
const tg=window.Telegram?.WebApp; if(tg){tg.ready();tg.expand()}

// ── Steps ────────────────────────────────────────
function nextStep(){
if(step===1&&!sur)return;
if(step===1){step=2;showStep2();return}
if(step===2){step=3;showStep3();return}
if(step===3){generate();return}
}
function prevStep(){if(step>1){step--;showStep(step)}}
function showStep(s){
step=s;
document.querySelectorAll('.step').forEach((el,i)=>{
el.className='step'+(i+1<step?' done':'')+(i+1===step?' on':'')
});
['surahSec','ayahSec','reciterSec','fontSec','prevSec'].forEach((id,i)=>{
document.getElementById(id).style.display=i+1<=step||(i===4&&step>=2)?'':'none'
});
document.getElementById('backBtn').style.display=step>1?'':'none';
let btn=document.getElementById('nextBtn');
if(step===3){
btn.textContent='✨ أنشئ الريل';btn.disabled=false;
document.getElementById('hint').textContent='جاهز؟ اضغط أنشئ'
}else if(step===2){
btn.textContent='التالي ←';btn.disabled=false;
document.getElementById('hint').textContent='اختر عدد الآيات'
}else{
btn.textContent='التالي ←';btn.disabled=!sur;
document.getElementById('hint').textContent='اختر السورة'
}
}
function showStep2(){
document.getElementById('ayahTitle').textContent=`📝 الآيات (1-${AC[sur-1]})`;
start=1;end=Math.min(7,AC[sur-1]);
document.getElementById('astart').max=AC[sur-1];document.getElementById('astart').value=1;
document.getElementById('aend').max=AC[sur-1];document.getElementById('aend').value=end;
document.getElementById('aspan').textContent='1';
document.getElementById('espan').textContent=end;
showStep(2);updatePreview()
}
function showStep3(){showStep(3);updatePreview()}

// ── Surahs ───────────────────────────────────────
function renderSurahs(f=""){
let t=f.toLowerCase().trim(),h="";
S.forEach((n,i)=>{let num=i+1;if(t&&!n.includes(t)&&!String(num).includes(t))return;
h+=`<div class="sitem${num===sur?' sel':''}" onclick="pickSurah(${num})"><span class="num">${num}</span>${n}</div>`});
document.getElementById('surahGrid').innerHTML=h||'<div style="grid-column:1/-1;text-align:center;color:var(--dim);padding:16px">لا نتائج</div>'
}
function pickSurah(n){sur=n;renderSurahs();document.getElementById('nextBtn').disabled=false;updatePreview()}
function filterSurahs(){renderSurahs(document.getElementById('surahSearch').value)}

// ── Range ────────────────────────────────────────
function updateRange(){
start=parseInt(document.getElementById('astart').value);
end=parseInt(document.getElementById('aend').value);
if(start>end){let t=start;start=end;end=t;
document.getElementById('astart').value=start;document.getElementById('aend').value=end}
document.getElementById('aspan').textContent=start;
document.getElementById('espan').textContent=end;
updatePreview()
}

// ── Reciters ─────────────────────────────────────
function renderReciters(f=""){
let t=f.toLowerCase().trim(),h="";
R.forEach(r=>{if(t&&!r.n.includes(t))return;
h+=`<div class="ritem${rec===r.id?' sel':''}" onclick="pickReciter('${r.id}')"><div><div class="rname">${r.n}</div><div class="rstyle">${r.s}</div></div><div class="rdot"></div></div>`});
document.getElementById('reciterList').innerHTML=h||'<div style="text-align:center;color:var(--dim);padding:16px">لا نتائج</div>'
}
function pickReciter(id){rec=id;renderReciters();updatePreview()}
function filterReciters(){renderReciters(document.getElementById('reciterSearch').value)}

// ── Fonts ────────────────────────────────────────
function renderFonts(){
let h="";F.forEach(f=>{h+=`<div class="fitem${font===f.id?' sel':''}" onclick="pickFont('${f.id}')">${f.t}<span class="flabel">${f.n}</span></div>`});
document.getElementById('fontGrid').innerHTML=h
}
function pickFont(id){font=id;renderFonts()}

// ── Preview ──────────────────────────────────────
function updatePreview(){
document.getElementById('pSurah').textContent=sur?`سورة ${S[sur-1]}`:'—';
document.getElementById('pAyahs').textContent=sur?`الآيات ${start} — ${end}`:'اختر سورة';
let r=R.find(x=>x.id===rec);document.getElementById('pRec').textContent=`🎙️ ${r?r.n:'—'}`;
document.getElementById('prevSec').style.display=sur?'':'none'
}

// ── Generate ─────────────────────────────────────
function generate(){
if(!sur)return;
let btn=document.getElementById('nextBtn');btn.disabled=true;btn.textContent='⏳ جاري...';
let data={action:"generate_reel",surah:sur,start_ayah:start,end_ayah:end,reciter:rec,font};
if(tg){tg.sendData(JSON.stringify(data))}
else{showToast('بيئة تطوير — تم: '+JSON.stringify(data));btn.disabled=false;btn.textContent='✨ أنشئ الريل'}
}
function showToast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

// ── Init ─────────────────────────────────────────
renderSurahs();renderReciters();renderFonts();updatePreview();
</script>
</body>
</html>
